name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Get Version
      id: version
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/app-debug.apk
        generate_release_notes: true
        name: "Monochrome v${{ steps.version.outputs.VERSION }}"
        body: |
          ## Monochrome Hi-Res Music App v${{ steps.version.outputs.VERSION }}
          
          ### 📱 Installation
          1. Download **app-debug.apk** below
          2. Transfer to your Android device
          3. Open the file and allow "Install from unknown sources" if prompted
          4. Install and enjoy high-resolution music streaming!
          
          ### ✅ Compatibility
          - Android 8.0+ (API 26) required
          - Android 16 (API 36) fully supported
          
          ### 🎵 Features
          - High-resolution audio streaming
          - Local file playback
          - Media session controls
          - Background playback
          - Pull-to-reload
          - Wave M logo
