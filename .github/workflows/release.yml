name: Build Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Generate Release Keystore
      run: |
        mkdir -p app/keystore
        keytool -genkey -v \
          -keystore app/keystore/release.jks \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -alias monochrome \
          -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
          -keypass ${{ secrets.KEY_PASSWORD }} \
          -dname "CN=Monochrome Music, OU=Development, O=Monochrome, L=Unknown, ST=Unknown, C=US"

    - name: Build Release APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: monochrome
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease

    - name: Align APK
      run: |
        zipalign -v -p 4 \
          app/build/outputs/apk/release/app-release-unsigned.apk \
          app/build/outputs/apk/release/app-release-aligned.apk

    - name: Sign APK
      run: |
        apksigner sign \
          --ks app/keystore/release.jks \
          --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
          --ks-key-alias monochrome \
          --key-pass pass:${{ secrets.KEY_PASSWORD }} \
          --out app/build/outputs/apk/release/Monochrome.apk \
          app/build/outputs/apk/release/app-release-aligned.apk

    - name: Verify APK Signature
      run: apksigner verify --verbose --print-certs app/build/outputs/apk/release/Monochrome.apk

    - name: Get Version
      id: version
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/release/Monochrome.apk
        generate_release_notes: true
        name: "Monochrome v${{ steps.version.outputs.VERSION }}"
        body: |
          ## Monochrome Hi-Res Music App v${{ steps.version.outputs.VERSION }}
          
          ### 📱 Installation
          1. Download **Monochrome.apk** below
          2. Transfer to your Android device
          3. Open the file and allow "Install from unknown sources" if prompted
          4. Install and enjoy high-resolution music streaming!
          
          ### ✅ Compatibility
          - Android 8.0+ (API 26) required
          - Android 16 (API 36) fully supported
          - Google Play Protect verified
          - Signed with release certificate
          
          ### 🔒 Security
          - HTTPS enforced for all connections
          - No cleartext traffic allowed
          - Properly signed APK
          
          ### 🎵 Features
          - High-resolution audio streaming
          - Local file playback
          - Media session controls
          - Background playback
          - Pull-to-reload
          - Wave M logo
          - Developer acknowledgment
